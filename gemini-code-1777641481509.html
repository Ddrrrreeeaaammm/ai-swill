<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL AI // STREAMING INTERFACE</title>
    <style>
        :root {
            --bg-color: #030305;
            --sidebar-color: #090912;
            --accent-color: #bf94ff;
            --text-color: #ffffff;
            --input-bg: #0a0a1a;
            --border-color: #16162a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid var(--border-color);
        }

        h1 { color: var(--accent-color); font-size: 24px; text-align: center; margin-bottom: 30px; }

        .btn-new {
            background-color: #16162e;
            color: var(--text-color);
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        #main { flex: 1; display: flex; flex-direction: column; padding: 20px; }

        #chat-display {
            flex: 1;
            background-color: #06060c;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 15px;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .msg { margin-bottom: 25px; line-height: 1.5; }
        .user-tag { color: #7c4dff; font-weight: bold; display: block; }
        .ai-tag { color: #ffffff; font-weight: bold; display: block; }

        .controls { display: flex; flex-direction: column; gap: 15px; }
        .modes { display: flex; background: #090912; padding: 5px; border-radius: 12px; justify-content: space-around; }
        .mode-btn { background: transparent; border: none; color: #555; padding: 8px 20px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .mode-btn.active { background-color: #7c4dff; color: white; }

        .input-group { display: flex; gap: 10px; }
        input { flex: 1; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 25px; padding: 15px 25px; color: white; outline: none; }
        .send-btn { background-color: var(--accent-color); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>SWILL AI</h1>
    <button class="btn-new" onclick="clearChat()">+ NEW CHAT</button>
    <div style="margin-top: auto; font-size: 10px; color: #555; text-align: center;">Created by Nikolai Gerasimov</div>
</div>

<div id="main">
    <div id="chat-display"></div>
    <div class="controls">
        <div class="modes">
            <button class="mode-btn active" onclick="setMode('Обычный')">Обычный</button>
            <button class="mode-btn" onclick="setMode('PRO')">PRO</button>
            <button class="mode-btn" onclick="setMode('Думающий')">Думающий</button>
        </div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Введите сообщение..." autocomplete="off">
            <button class="send-btn" id="ctrl-btn" onclick="sendMessage()">↑</button>
        </div>
    </div>
</div>

<script>
    let currentMode = "Обычный";
    const creator = "Николай Герасимов";
    const year = "2026";

    // УСТАНОВИ СВОЙ АДРЕС PORTMAP ЗДЕСЬ
    const API_URL = "http://Ddrrrreeeaaammm-57163.portmap.host:57163/v1/chat/completions";

    document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === mode);
        });
    }

    function clearChat() { document.getElementById('chat-display').innerHTML = ''; }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const display = document.getElementById('chat-display');
        const val = input.value.trim();
        if (!val) return;

        input.value = '';
        display.innerHTML += `<div class="msg"><span class="user-tag">[ YOU ]</span>${val}</div>`;
        
        const aiMsgDiv = document.createElement('div');
        aiMsgDiv.className = 'msg';
        aiMsgDiv.innerHTML = `<span class="ai-tag">[ ${currentMode.toUpperCase()} ]</span>`;
        const textSpan = document.createElement('span');
        aiMsgDiv.appendChild(textSpan);
        display.appendChild(aiMsgDiv);
        display.scrollTop = display.scrollHeight;

        let systemContent = `Ты Swill AI. Создатель: ${creator}.`;

        try {
            // Используем внешний адрес вместо локального 127.0.0.1
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [{ role: "system", content: systemContent }, { role: "user", content: val }],
                    temperature: 0.7,
                    stream: true 
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split("\n");

                for (const line of lines) {
                    if (line.startsWith("data: ") && line !== "data: [DONE]") {
                        try {
                            const data = JSON.parse(line.slice(6));
                            const content = data.choices[0].delta.content || "";
                            textSpan.innerText += content; 
                            display.scrollTop = display.scrollHeight;
                        } catch (e) {}
                    }
                }
            }
        } catch (e) {
            textSpan.innerText = "Ошибка подключения: проверь запущен ли LM Studio (Port: 5555), OpenVPN и включен ли CORS.";
        }
    }
</script>
</body>
</html>
